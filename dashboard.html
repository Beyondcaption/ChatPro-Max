<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatPro Dashboard - mit User Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: #1a1f3a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: 400px;
        }

        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00ff88;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #2d3454;
            background: #242a47;
            color: #e0e0e0;
            font-size: 14px;
        }

        .login-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-box button:hover {
            transform: translateY(-2px);
        }

        .login-error {
            color: #ff4444;
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        /* Main Dashboard */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header h1 {
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            background: #00ff88;
            color: #0a0e27;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .sidebar {
            background: #1a1f3a;
            border-radius: 10px;
            padding: 20px;
            height: fit-content;
        }

        .sidebar-title {
            color: #667eea;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .employee-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .employee-item {
            padding: 12px;
            background: #242a47;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .employee-item:hover {
            background: #2d3454;
            transform: translateX(5px);
        }

        .employee-item.selected {
            background: #667eea;
        }

        .employee-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .employee-status {
            font-size: 12px;
            color: #888;
        }

        .main-content {
            background: #1a1f3a;
            border-radius: 10px;
            padding: 30px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #242a47;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value {
            color: #00d4ff;
            font-size: 36px;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #242a47;
            padding-bottom: 10px;
        }

        .tab {
            background: transparent;
            border: none;
            color: #888;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            border-radius: 5px;
        }

        .tab:hover {
            background: #242a47;
            color: #e0e0e0;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
        }

        .filter-bar select {
            background: #242a47;
            color: #e0e0e0;
            border: 1px solid #2d3454;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .filter-bar button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .filter-bar button:hover {
            transform: translateY(-2px);
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .export-btn {
            background: #00ff88;
            color: #0a0e27;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .export-btn:hover {
            background: #00dd77;
            transform: translateY(-2px);
        }

        .activity-item {
            background: #242a47;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #00d4ff;
        }

        .activity-app {
            font-weight: 600;
            color: #00ff88;
            margin-bottom: 5px;
        }

        .activity-title {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .activity-time {
            color: #888;
            font-size: 12px;
        }

        .screenshots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .screenshot-item {
            background: #242a47;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .screenshot-item:hover {
            transform: scale(1.05);
        }

        .screenshot-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .screenshot-info {
            padding: 10px;
        }

        .screenshot-time {
            font-size: 12px;
            color: #888;
        }

        .downloads-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .download-item {
            background: #242a47;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .download-icon {
            font-size: 24px;
            margin-right: 10px;
        }

        .download-info {
            flex: 1;
        }

        .download-name {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .download-meta {
            font-size: 12px;
            color: #888;
        }

        /* ADMIN TAB STYLES */
        .admin-section {
            background: #242a47;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .admin-section h3 {
            color: #00ff88;
            margin-bottom: 15px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .user-card {
            background: #1a1f3a;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .user-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .user-card-name {
            font-weight: 600;
            font-size: 16px;
            color: #e0e0e0;
        }

        .user-card-id {
            font-size: 12px;
            color: #888;
        }

        .user-card-stats {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #2d3454;
        }

        .user-stat {
            font-size: 12px;
            color: #ccc;
        }

        .user-stat strong {
            color: #00ff88;
        }

        .btn-delete {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: #cc0000;
        }

        .create-user-form {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .create-user-form input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #2d3454;
            background: #1a1f3a;
            color: #e0e0e0;
            font-size: 14px;
        }

        .create-user-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .system-info {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .system-info-item {
            background: #1a1f3a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .system-info-value {
            font-size: 32px;
            font-weight: 600;
            color: #00ff88;
            margin-bottom: 5px;
        }

        .system-info-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .hidden {
            display: none !important;
        }

        /* Creator Profiles */
        .profile-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .profile-form-grid input,
        .profile-form-grid textarea {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #2d3454;
            background: #1a1f3a;
            color: #e0e0e0;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
        }

        .profile-form-grid input:focus,
        .profile-form-grid textarea:focus {
            outline: none;
            border-color: #ff4d8f;
        }

        .profile-form-grid .full-width {
            grid-column: 1 / -1;
        }

        .admin-key-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px;
            background: #1a1f3a;
            border-radius: 8px;
            border: 1px solid #2d3454;
        }

        .admin-key-row input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid #2d3454;
            background: #0a0e27;
            color: #e0e0e0;
            font-size: 13px;
        }

        .admin-key-row input:focus {
            outline: none;
            border-color: #ff4d8f;
        }

        .profile-card {
            background: #1a1f3a;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #ff4d8f;
            margin-bottom: 12px;
        }

        .profile-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .profile-card-name {
            font-weight: 700;
            font-size: 16px;
            color: #ff4d8f;
        }

        .profile-card-details {
            font-size: 12px;
            color: #888;
            line-height: 1.7;
        }

        .profile-card-details span {
            display: block;
        }

        /* Model Sheet Editor */
        .sheet-editor { display:none; background:#0a0e27; border:1px solid #2d3454; border-radius:8px; padding:16px; margin-top:12px; }
        .sheet-editor.open { display:block; }
        .sheet-section-label { font-size:11px; color:#888; margin-bottom:4px; margin-top:12px; text-transform:uppercase; letter-spacing:0.08em; }
        .sheet-section-label:first-child { margin-top:0; }
        .sheet-editor textarea { width:100%; padding:8px 10px; border-radius:5px; border:1px solid #2d3454; background:#1a1f3a; color:#e0e0e0; font-size:12px; font-family:'Courier New',monospace; resize:vertical; line-height:1.6; }
        .sheet-editor textarea:focus { outline:none; border-color:#ff4d8f; }
        .sheet-hint { font-size:10px; color:#555; margin-top:3px; margin-bottom:8px; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h1>🔐 ChatPro Dashboard</h1>
            <input type="text" id="loginUsername" placeholder="Username" />
            <input type="password" id="loginPassword" placeholder="Password" />
            <button onclick="login()">Anmelden</button>
            <div class="login-error" id="loginError">❌ Ungültige Anmeldedaten</div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="mainDashboard" class="hidden">
        <div class="header">
            <h1>📊 ChatPro Dashboard</h1>
            <div class="status-badge">🟢 ONLINE</div>
        </div>

        <div class="container">
            <div class="sidebar">
                <div class="sidebar-title">👥 EMPLOYEES (<span id="employeeCount">0</span>)</div>
                <div class="employee-list" id="employeeList">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <div class="main-content">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">ONLINE</div>
                        <div class="stat-value" id="statOnline">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">AKTIVITÄTEN</div>
                        <div class="stat-value" id="statActivities">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">SCREENSHOTS</div>
                        <div class="stat-value" id="statScreenshots">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">DOWNLOADS</div>
                        <div class="stat-value" id="statDownloads">0</div>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab active" data-tab="activity">Aktivität</button>
                    <button class="tab" data-tab="screenshots">Screenshots</button>
                    <button class="tab" data-tab="downloads">Downloads</button>
                    <button class="tab" data-tab="admin">👤 Admin</button>
                </div>

                <!-- Activity Tab -->
                <div id="activity-content" class="tab-content active">
                    <div class="filter-bar">
                        <label>Filter:</label>
                        <select id="activityFilter">
                            <option value="all">Alle</option>
                            <option value="today">Heute</option>
                            <option value="week">Letzte 7 Tage</option>
                            <option value="month">Letzte 30 Tage</option>
                        </select>
                    </div>
                    <div id="activityList"></div>
                </div>

                <!-- Screenshots Tab -->
                <div id="screenshots-content" class="tab-content">
                    <div class="filter-bar">
                        <label>Filter:</label>
                        <select id="screenshotsFilter">
                            <option value="all">Alle</option>
                            <option value="today">Heute</option>
                            <option value="week">Letzte 7 Tage</option>
                            <option value="month">Letzte 30 Tage</option>
                        </select>
                    </div>
                    <div class="export-buttons">
                        <button class="export-btn" onclick="exportScreenshots()">
                            📦 Screenshots als ZIP exportieren
                        </button>
                    </div>
                    <div id="screenshotsList" class="screenshots-grid"></div>
                </div>

                <!-- Downloads Tab -->
                <div id="downloads-content" class="tab-content">
                    <div class="filter-bar">
                        <label>Filter:</label>
                        <select id="downloadsFilter">
                            <option value="all">Alle</option>
                            <option value="today">Heute</option>
                            <option value="week">Letzte 7 Tage</option>
                            <option value="month">Letzte 30 Tage</option>
                        </select>
                    </div>
                    <div class="export-buttons">
                        <button class="export-btn" onclick="exportDownloads()">
                            📄 Downloads als CSV exportieren
                        </button>
                    </div>
                    <div id="downloadsList" class="downloads-list"></div>
                </div>

                <!-- Admin Tab -->
                <div id="admin-content" class="tab-content">
                    <h2>👥 User Management</h2>
                    
                    <!-- User List -->
                    <div class="admin-section">
                        <h3>📋 Aktive Benutzer</h3>
                        <div id="users-list" class="users-grid"></div>
                    </div>
                    
                    <!-- Create User Form -->
                    <div class="admin-section">
                        <h3>➕ Neuen Benutzer erstellen</h3>
                        <div class="create-user-form">
                            <input type="text" id="new-username" placeholder="Benutzername" />
                            <input type="text" id="new-employee-name" placeholder="Voller Name" />
                            <button onclick="createUser()" class="btn-primary">Benutzer erstellen</button>
                        </div>
                    </div>
                    
                    <!-- System Info -->
                    <div class="admin-section">
                        <h3>📊 System Information</h3>
                        <div id="system-info" class="system-info"></div>
                    </div>

                    <!-- Creator Profiles -->
                    <div class="admin-section">
                        <h3>🎭 Creator Profile</h3>

                        <div class="admin-key-row">
                            <span style="font-size:13px;color:#888;white-space:nowrap;">Admin Key:</span>
                            <input type="password" id="adminKeyInput" placeholder="Für Erstellen & Löschen erforderlich" />
                        </div>

                        <div id="profiles-list" style="margin-bottom:20px;"></div>

                        <div style="color:#00ff88;font-weight:600;margin-bottom:12px;font-size:15px;">➕ Neues Profil erstellen</div>
                        <div class="profile-form-grid">
                            <input type="text" id="p-name" placeholder="Name (z.B. Luna) *" />
                            <input type="number" id="p-age" placeholder="Alter" min="18" max="99" />
                            <textarea id="p-personality" rows="2" placeholder="Persönlichkeit (z.B. verspielt, selbstbewusst, warm)"></textarea>
                            <textarea id="p-interests" rows="2" placeholder="Interessen & Hobbys (z.B. Fitness, Netflix, Kochen)"></textarea>
                            <textarea id="p-preferences" rows="2" placeholder="Vorlieben (z.B. mag Komplimente, intensive Gespräche)"></textarea>
                            <textarea id="p-style" rows="2" placeholder="Kommunikationsstil (z.B. kurz, direkt, viele Emojis)"></textarea>
                            <textarea id="p-avoid" rows="2" class="full-width" placeholder="Themen vermeiden (z.B. Wohnort, echter Name, Ex-Freunde)"></textarea>
                        </div>
                        <button onclick="createProfile()" class="btn-primary">🎭 Profil erstellen</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <img id="modalImage" src="" alt="Screenshot" />
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        // Configuration
        const API_URL = 'https://monitoring-relay-production.up.railway.app/api';
        let currentEmployee = null;
        let employees = [];
        let ws = null;

        // Login Function
        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    // ✅ Admin sieht ALLE Employees, nicht nur sich selbst
                    if (data.user.role === 'admin') {
                        currentEmployee = null; // Admin wählt Employee aus Liste
                    } else {
                        currentEmployee = data.user; // Employee sieht nur eigene Daten
                    }
                    
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('mainDashboard').classList.remove('hidden');
                    
                    initDashboard();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // Initialize Dashboard
        function initDashboard() {
            loadEmployees().then(() => {
                // ✅ Wenn Admin und kein Employee gewählt → wähle ersten aus Liste
                if (!currentEmployee && employees.length > 0) {
                    selectEmployee(employees[0].id);
                }
            });
            connectWebSocket();
            initTabs();
            setInterval(loadEmployees, 5000);
        }

        // Tab System
        function initTabs() {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabName = tab.dataset.tab;
                    
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    
                    tab.classList.add('active');
                    document.getElementById(`${tabName}-content`).classList.add('active');
                    
                    if (tabName === 'admin') {
                        loadUsers();
                        loadProfiles();
                    } else if (currentEmployee) {
                        loadDataForTab(tabName);
                    }
                });
            });
        }

        async function loadEmployees() {
            try {
                const response = await fetch(`${API_URL}/employees`);
                const data = await response.json();
                employees = data.employees || [];
                
                displayEmployees();
                updateStats();
            } catch (error) {
                console.error('Error loading employees:', error);
            }
        }

        // Display Employees
        function displayEmployees() {
            const list = document.getElementById('employeeList');
            document.getElementById('employeeCount').textContent = employees.length;
            
            list.innerHTML = employees.map(emp => `
                <div class="employee-item ${currentEmployee && emp.id === currentEmployee.employeeId ? 'selected' : ''}" 
                     onclick="selectEmployee(${emp.id})">
                    <div class="employee-name">${emp.name}</div>
                    <div class="employee-status">
                        ${emp.online ? '🟢 Online' : '⚪ Offline'} • ${emp.currentApp || 'Inaktiv'}
                    </div>
                </div>
            `).join('');
        }

        // Select Employee
        function selectEmployee(employeeId) {
            currentEmployee = employees.find(e => e.id === employeeId) || { employeeId };
            displayEmployees();
            
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            loadDataForTab(activeTab);
        }

        // Update Stats
        function updateStats() {
            const onlineCount = employees.filter(e => e.online).length;
            const totalActivities = employees.reduce((sum, e) => sum + (e.activityCount || 0), 0);
            const totalScreenshots = employees.reduce((sum, e) => sum + (e.screenshotCount || 0), 0);
            const totalDownloads = employees.reduce((sum, e) => sum + (e.downloadCount || 0), 0);
            
            document.getElementById('statOnline').textContent = onlineCount;
            document.getElementById('statActivities').textContent = totalActivities;
            document.getElementById('statScreenshots').textContent = totalScreenshots;
            document.getElementById('statDownloads').textContent = totalDownloads;
        }

        // Load Data for Tab
        async function loadDataForTab(tab) {
            if (!currentEmployee) return;
            
            if (tab === 'activity') await loadActivities();
            if (tab === 'screenshots') await loadScreenshots();
            if (tab === 'downloads') await loadDownloads();
        }

        // Load Activities
        async function loadActivities() {
            try {
                const response = await fetch(`${API_URL}/activities/${currentEmployee.employeeId}`);
                const data = await response.json();
                
                const activities = data.activities || [];
                const filtered = filterByDate(activities, document.getElementById('activityFilter').value);
                
                const list = document.getElementById('activityList');
                if (filtered.length === 0) {
                    list.innerHTML = '<p style="color: #888;">Keine Aktivitäten im gewählten Zeitraum</p>';
                    return;
                }
                
                list.innerHTML = filtered.map(act => `
                    <div class="activity-item">
                        <div class="activity-app">${act.appName || 'Unbekannt'}</div>
                        <div class="activity-title">${act.windowTitle || ''}</div>
                        <div class="activity-time">${formatDate(act.timestamp)}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading activities:', error);
            }
        }

        // Load Screenshots
        async function loadScreenshots() {
            try {
                const response = await fetch(`${API_URL}/screenshots/${currentEmployee.employeeId}`);
                const data = await response.json();
                
                const screenshots = data.screenshots || [];
                const filtered = filterByDate(screenshots, document.getElementById('screenshotsFilter').value);
                
                const list = document.getElementById('screenshotsList');
                if (filtered.length === 0) {
                    list.innerHTML = '<p style="color: #888;">Keine Screenshots im gewählten Zeitraum</p>';
                    return;
                }
                
                list.innerHTML = filtered.map(shot => `
                    <div class="screenshot-item" onclick="openModal('${shot.imageData}')">
                        <img src="${shot.imageData}" alt="${shot.filename}" />
                        <div class="screenshot-info">
                            <div>${shot.filename}</div>
                            <div class="screenshot-time">${formatDate(shot.timestamp)}</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading screenshots:', error);
            }
        }

        // Load Downloads
        async function loadDownloads() {
            try {
                const response = await fetch(`${API_URL}/downloads/${currentEmployee.employeeId}`);
                const data = await response.json();
                
                const downloads = data.downloads || [];
                const filtered = filterByDate(downloads, document.getElementById('downloadsFilter').value);
                
                const list = document.getElementById('downloadsList');
                if (filtered.length === 0) {
                    list.innerHTML = '<p style="color: #888;">Keine Downloads im gewählten Zeitraum</p>';
                    return;
                }
                
                list.innerHTML = filtered.map(dl => `
                    <div class="download-item">
                        <div class="download-icon">${dl.isScreenshot ? '📸' : '📥'}</div>
                        <div class="download-info">
                            <div class="download-name">${dl.filename}</div>
                            <div class="download-meta">
                                ${formatFileSize(dl.filesize)} • ${formatDate(dl.timestamp)}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading downloads:', error);
            }
        }

        // Load Translations
        // Helper: Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // USER MANAGEMENT FUNCTIONS
        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/admin/users`);
                if (!response.ok) throw new Error('Failed to load users');
                
                const data = await response.json();
                
                // Transform users to employees format
                const employees = (data.users || [])
                    .filter(u => u.role === 'employee')
                    .map(u => ({
                        id: u.employeeId,
                        name: u.username,
                        username: u.username,
                        online: false, // Will be updated by WebSocket
                        createdAt: u.createdAt
                    }));
                
                displayUsers(employees);
                updateSystemInfo(employees);
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        function displayUsers(users) {
            const container = document.getElementById('users-list');
            if (!container) return;
            
            if (users.length === 0) {
                container.innerHTML = '<p style="color: #888;">Keine Benutzer gefunden.</p>';
                return;
            }
            
            container.innerHTML = users.map(user => `
                <div class="user-card">
                    <div class="user-card-header">
                        <div>
                            <div class="user-card-name">${user.name || 'Unbekannt'}</div>
                            <div class="user-card-id">ID: ${user.id}</div>
                        </div>
                        ${user.id !== 0 ? `<button class="btn-delete" onclick="deleteUser(${user.id}, '${user.name}')">Löschen</button>` : ''}
                    </div>
                    <div class="user-card-stats">
                        <div class="user-stat">
                            Status: <strong>${user.online ? '🟢 Online' : '⚪ Offline'}</strong>
                        </div>
                        <div class="user-stat">
                            App: <strong>${user.currentApp || 'N/A'}</strong>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function createUser() {
            const username = document.getElementById('new-username').value.trim();
            const employeeName = document.getElementById('new-employee-name').value.trim();
            
            if (!username || !employeeName) {
                alert('Bitte Username und Name eingeben!');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/users/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, employeeName })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to create user');
                }
                
                const result = await response.json();
                alert(`✅ Benutzer erstellt!\n\nUsername: ${result.username}\nPassword: ${result.password}\n\n⚠️ WICHTIG: Passwort notieren! Es wird nur einmal angezeigt.`);
                
                document.getElementById('new-username').value = '';
                document.getElementById('new-employee-name').value = '';
                
                loadUsers();
            } catch (error) {
                alert(`❌ Fehler: ${error.message}`);
                console.error('Error creating user:', error);
            }
        }

        async function deleteUser(userId, userName) {
            if (!confirm(`Benutzer "${userName}" (ID: ${userId}) wirklich löschen?`)) {
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/users/${userId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to delete user');
                }
                
                alert(`✅ Benutzer "${userName}" gelöscht!`);
                loadUsers();
            } catch (error) {
                alert(`❌ Fehler: ${error.message}`);
                console.error('Error deleting user:', error);
            }
        }

        function updateSystemInfo(users) {
            const container = document.getElementById('system-info');
            if (!container) return;
            
            const totalUsers = users.length;
            const onlineUsers = users.filter(u => u.online).length;
            const totalActivities = users.reduce((sum, u) => sum + (u.activityCount || 0), 0);
            const totalScreenshots = users.reduce((sum, u) => sum + (u.screenshotCount || 0), 0);
            
            container.innerHTML = `
                <div class="system-info-item">
                    <div class="system-info-value">${totalUsers}</div>
                    <div class="system-info-label">Gesamt Benutzer</div>
                </div>
                <div class="system-info-item">
                    <div class="system-info-value">${onlineUsers}</div>
                    <div class="system-info-label">Online</div>
                </div>
                <div class="system-info-item">
                    <div class="system-info-value">${totalActivities}</div>
                    <div class="system-info-label">Activities</div>
                </div>
                <div class="system-info-item">
                    <div class="system-info-value">${totalScreenshots}</div>
                    <div class="system-info-label">Screenshots</div>
                </div>
            `;
        }

        // Export Functions
        async function exportScreenshots() {
            try {
                const response = await fetch(`${API_URL}/screenshots/${currentEmployee.employeeId}`);
                const data = await response.json();
                const screenshots = data.screenshots || [];
                
                if (screenshots.length === 0) {
                    alert('Keine Screenshots zum Exportieren');
                    return;
                }
                
                const zip = new JSZip();
                
                screenshots.forEach(shot => {
                    const base64Data = shot.imageData.split(',')[1];
                    zip.file(shot.filename, base64Data, {base64: true});
                });
                
                const blob = await zip.generateAsync({type: 'blob'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `screenshots-${currentEmployee.employeeId}-${Date.now()}.zip`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (error) {
                console.error('Export error:', error);
                alert('Fehler beim Export');
            }
        }

        function exportDownloads() {
            fetch(`${API_URL}/downloads/${currentEmployee.employeeId}`)
                .then(r => r.json())
                .then(data => {
                    const downloads = data.downloads || [];
                    if (downloads.length === 0) {
                        alert('Keine Downloads zum Exportieren');
                        return;
                    }
                    
                    let csv = 'Dateiname,Größe,Typ,Zeitstempel\n';
                    downloads.forEach(dl => {
                        csv += `"${dl.filename}",${dl.filesize},${dl.isScreenshot ? 'Screenshot' : 'Download'},"${formatDate(dl.timestamp)}"\n`;
                    });
                    
                    const blob = new Blob([csv], {type: 'text/csv'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `downloads-${currentEmployee.employeeId}-${Date.now()}.csv`;
                    a.click();
                    URL.revokeObjectURL(url);
                });
        }

        // WebSocket
        function connectWebSocket() {
            const wsUrl = API_URL.replace('https://', 'wss://').replace('/api', '');
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => console.log('WebSocket connected');
            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                if (message.type === 'employees_update') {
                    employees = message.data;
                    displayEmployees();
                    updateStats();
                }
            };
            ws.onerror = (error) => console.error('WebSocket error:', error);
            ws.onclose = () => {
                console.log('WebSocket disconnected, reconnecting...');
                setTimeout(connectWebSocket, 3000);
            };
        }

        // Utility Functions
        function filterByDate(items, filter) {
            const now = Date.now();
            const day = 24 * 60 * 60 * 1000;
            
            return items.filter(item => {
                const itemTime = new Date(item.timestamp).getTime();
                if (filter === 'today') return now - itemTime < day;
                if (filter === 'week') return now - itemTime < 7 * day;
                if (filter === 'month') return now - itemTime < 30 * day;
                return true;
            });
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleString('de-DE', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function openModal(imageData) {
            document.getElementById('modalImage').src = imageData;
            document.getElementById('imageModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }

        // ── Creator Profiles ──
        async function loadProfiles() {
            try {
                const res = await fetch(`${API_URL}/creator-profiles`);
                const data = await res.json();
                const profiles = data.profiles || [];
                const container = document.getElementById('profiles-list');
                if (!container) return;

                if (profiles.length === 0) {
                    container.innerHTML = '<p style="color:#888;">Noch keine Profile angelegt.</p>';
                    return;
                }

                container.innerHTML = profiles.map(p => {
                    const sd = p.sheet_data || {};
                    return `
                    <div class="profile-card" id="card-${p.id}">
                        <div class="profile-card-header">
                            <div class="profile-card-name">${p.name}${p.age ? ' (' + p.age + ')' : ''}</div>
                            <div style="display:flex;gap:8px;">
                                <button class="btn-primary" style="font-size:12px;padding:5px 12px;" onclick="toggleSheetEditor('${p.id}')">📝 Model Sheet</button>
                                <button class="btn-delete" onclick="deleteProfile('${p.id}', '${escapeHtml(p.name)}')">Löschen</button>
                            </div>
                        </div>
                        <div class="profile-card-details">
                            ${p.personality ? '<span>🧠 ' + escapeHtml(p.personality) + '</span>' : ''}
                            ${p.interests ? '<span>🎯 ' + escapeHtml(p.interests) + '</span>' : ''}
                            ${p.preferences ? '<span>💜 ' + escapeHtml(p.preferences) + '</span>' : ''}
                            ${p.style ? '<span>💬 ' + escapeHtml(p.style) + '</span>' : ''}
                            ${p.avoid_topics ? '<span>🚫 ' + escapeHtml(p.avoid_topics) + '</span>' : ''}
                        </div>
                        <div class="sheet-editor" id="sheet-${p.id}">
                            <div class="sheet-section-label">👤 General Info</div>
                            <div class="sheet-hint">Name, Age, Location, Height, Body type, Languages — one per line as "Key: Value"</div>
                            <textarea id="sd-general-${p.id}" rows="5">${escapeHtml(sd.general || '')}</textarea>

                            <div class="sheet-section-label">📖 Background</div>
                            <div class="sheet-hint">Free text — her story, where she grew up, what she does for fun</div>
                            <textarea id="sd-background-${p.id}" rows="4">${escapeHtml(sd.background || '')}</textarea>

                            <div class="sheet-section-label">⭐ Favorites</div>
                            <div class="sheet-hint">Favorite food, movies, music, colors etc. as "Key: Value"</div>
                            <textarea id="sd-favorites-${p.id}" rows="4">${escapeHtml(sd.favorites || '')}</textarea>

                            <div class="sheet-section-label">🧠 Personality</div>
                            <div class="sheet-hint">Traits, turn-ons, turn-offs, communication style as "Key: Value"</div>
                            <textarea id="sd-personality-${p.id}" rows="4">${escapeHtml(sd.personality || '')}</textarea>

                            <div class="sheet-section-label">🎭 Cosplay</div>
                            <div class="sheet-hint">Costumes, themes, styles she does as "Key: Value" or free text</div>
                            <textarea id="sd-cosplay-${p.id}" rows="3">${escapeHtml(sd.cosplay || '')}</textarea>

                            <div class="sheet-section-label">🔒 Content Info (Internal Only)</div>
                            <div class="sheet-hint">PPV prices, what she will/won't do, content limits — NEVER share with fans</div>
                            <textarea id="sd-content-${p.id}" rows="4">${escapeHtml(sd.content || '')}</textarea>

                            <div style="margin-top:14px;display:flex;gap:10px;align-items:center;">
                                <button class="btn-primary" onclick="saveSheet('${p.id}')">💾 Sheet speichern</button>
                                <span id="sheet-status-${p.id}" style="font-size:12px;color:#00ff88;display:none;">✅ Gespeichert!</span>
                            </div>
                        </div>
                    </div>
                `}).join('');
            } catch(e) {
                console.error('Error loading profiles:', e);
            }
        }

        async function createProfile() {
            const adminKey = document.getElementById('adminKeyInput').value.trim();
            if (!adminKey) { alert('Bitte Admin Key eingeben!'); return; }

            const name = document.getElementById('p-name').value.trim();
            if (!name) { alert('Name ist Pflichtfeld!'); return; }

            const profile = {
                name,
                age: parseInt(document.getElementById('p-age').value) || null,
                personality: document.getElementById('p-personality').value.trim(),
                interests: document.getElementById('p-interests').value.trim(),
                preferences: document.getElementById('p-preferences').value.trim(),
                style: document.getElementById('p-style').value.trim(),
                avoid_topics: document.getElementById('p-avoid').value.trim()
            };

            try {
                const res = await fetch(`${API_URL}/admin/creator-profiles`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
                    body: JSON.stringify(profile)
                });
                if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Fehler'); }

                alert(`✅ Profil "${name}" erstellt!`);
                ['p-name','p-age','p-personality','p-interests','p-preferences','p-style','p-avoid'].forEach(id => {
                    document.getElementById(id).value = '';
                });
                loadProfiles();
            } catch(e) {
                alert('❌ Fehler: ' + e.message);
            }
        }

        function toggleSheetEditor(id) {
            const el = document.getElementById('sheet-' + id);
            el.classList.toggle('open');
        }

        async function saveSheet(id) {
            const adminKey = document.getElementById('adminKeyInput').value.trim();
            if (!adminKey) { alert('Bitte Admin Key eingeben!'); return; }

            const sheet_data = {
                general:     document.getElementById('sd-general-' + id).value.trim(),
                background:  document.getElementById('sd-background-' + id).value.trim(),
                favorites:   document.getElementById('sd-favorites-' + id).value.trim(),
                personality: document.getElementById('sd-personality-' + id).value.trim(),
                cosplay:     document.getElementById('sd-cosplay-' + id).value.trim(),
                content:     document.getElementById('sd-content-' + id).value.trim()
            };

            try {
                const res = await fetch(`${API_URL}/admin/creator-profiles/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
                    body: JSON.stringify({ sheet_data })
                });
                if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Fehler'); }
                const status = document.getElementById('sheet-status-' + id);
                status.style.display = 'inline';
                setTimeout(() => { status.style.display = 'none'; }, 2500);
            } catch(e) {
                alert('❌ Fehler: ' + e.message);
            }
        }

        async function deleteProfile(id, name) {
            const adminKey = document.getElementById('adminKeyInput').value.trim();
            if (!adminKey) { alert('Bitte Admin Key eingeben!'); return; }
            if (!confirm(`Profil "${name}" wirklich löschen?`)) return;

            try {
                const res = await fetch(`${API_URL}/admin/creator-profiles/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-admin-key': adminKey }
                });
                if (!res.ok) throw new Error('Fehler beim Löschen');
                alert(`✅ Profil "${name}" gelöscht!`);
                loadProfiles();
            } catch(e) {
                alert('❌ Fehler: ' + e.message);
            }
        }

        // Filter Event Listeners
        document.getElementById('activityFilter').addEventListener('change', loadActivities);
        document.getElementById('screenshotsFilter').addEventListener('change', loadScreenshots);
        document.getElementById('downloadsFilter').addEventListener('change', loadDownloads);
    </script>
</body>
